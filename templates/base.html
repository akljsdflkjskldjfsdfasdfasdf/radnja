<!doctype html>
<!-- base.html — zajednički okvir svih ekrana (zaglavlje, stil, poruke).
     Ostali ekrani se "ubacuju" u njega, da ne ponavljamo isti kod svuda. -->
<html lang="sr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Radnja</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Ovo troje omogućava "Dodaj na početni ekran" — sajt se ponaša kao aplikacija. -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <meta name="theme-color" content="#2d6a4f">
</head>
<body>
    <header>
        <a href="{{ url_for('prijem') }}">📦 Prijem</a>
        <a href="{{ url_for('istice') }}">⏰ Ističe</a>
        <a href="{{ url_for('otpis') }}">🗑 Otpis</a>
        <a href="{{ url_for('prodaja_statistika') }}">📈 Prodaja</a>
        <a href="{{ url_for('zalihe') }}">📊 Zalihe</a>
        <a href="{{ url_for('proizvodi') }}">🏷 Artikli</a>
    </header>
    <main>
        {% if request.args.get('poruka') %}
        <div class="poruka">{{ request.args.get('poruka') }}</div>
        {% endif %}
        {% block sadrzaj %}{% endblock %}
    </main>
    <footer>
        <a href="{{ url_for('pomoc') }}">❓ Uputstvo</a>
        &nbsp;·&nbsp;
        <a href="{{ url_for('backup') }}">💾 Preuzmi kopiju baze</a>
    </footer>
</body>
</html>
